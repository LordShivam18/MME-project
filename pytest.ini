[pytest]
asyncio_mode = auto
testpaths = tests

# ── Parallel Execution (pytest-xdist) ────────────────────────
# Use `pytest -n auto` to enable. Not forced here so single-run
# debugging with `pytest -v` still works without xdist overhead.

# ── Rerun Flaky Tests (pytest-rerunfailures) ─────────────────
# @pytest.mark.flaky(reruns=N) on individual tests takes priority.
# This global fallback catches unmarked transient failures.
reruns = 1
reruns_delay = 2

# ── Custom Markers ──────────────────────────────────────────
markers =
    auth: Authentication & JWT tests
    products: Product CRUD tests
    orders: Order & contact tests
    billing: Billing & subscription tests
    integration: End-to-end flow tests
    perf: Performance assertion tests

# ── Performance Thresholds (informational, enforced in conftest) ──
# PERF_THRESHOLD_FAST     = 2.0s   (reads)
# PERF_THRESHOLD_STANDARD = 5.0s   (writes)
# PERF_THRESHOLD_HEAVY    = 10.0s  (multi-step flows)
