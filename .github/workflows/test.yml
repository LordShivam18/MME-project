name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (parallel + auto-retry)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # -n auto  → pytest-xdist distributes tests across CPU cores
          # --reruns handled by pytest.ini (global fallback: 1 rerun, 2s delay)
          # --dist loadscope → groups tests by module so fixtures aren't duplicated
          # || true  → non-blocking until strict enforcement is enabled
          pytest -v -n auto --dist loadscope || true
