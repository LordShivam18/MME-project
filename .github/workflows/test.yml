name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx anyio

      - name: Run tests (non-blocking)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Non-blocking: CI validates but does NOT block dev during early stage.
          # Remove `|| true` when ready for strict enforcement.
          pytest -v || true
